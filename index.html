<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Calculator</title>
    <style>
        *{ 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family:Arial, sans-serif;
        }
        Body{
        Display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color:linear-gradient(135deg, #1e3c72, #2a5298);
        }
        .calculator{
            background-color: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        #display{
            width: 100%;
            height: 60px;
            border: none;
            outline: none;
            font-size: 30px;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            background: #f1f1f1;
            border-radius: 10px;
        }
        .buttons{
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-gap: 10px;
        }
        button{
            height: 60px;
            border: none;
            border-radius: 10px;
            font-size: 22px;
            cursor: pointer;
            transition:0.3s;
        }
        button:hover{
            transform: scale(1.05);
        }
        .number{
            background-color:#e0e0e0;
        }
        .operator{
            background: #ff9800;
            color:white;
        }
            .equal{
                background:#4caf50;
                color:white;
            }
            .equal{
                background:#f44336;
                color:white;
            } 
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="append('/')">/</button>
            <button class="operator" onclick="append('*')">*</button>
            <button class="operator" onclick="append('-')">-</button>
            <button class="number" onclick="append('7')">7</button>
            <button class="number" onclick="append('8')">8</button>
            <button class="number" onclick="append('9')">9</button>
            <button class="operator" onclick="append('+')">+</button>
            <button class="number" onclick="append('4')">4</button>
            <button class="number" onclick="append('5')">5</button>
            <button class="number" onclick="append('6')">6</button>
            <button class="equal" onclick="calculate()">=</button>
            <button class="number" onclick="append('1')">1</button>
            <button class="number" onclick="append('2')">2</button>
            <button class="number" onclick="append('3')">3</button>
            <button class="number" onclick="append('.')">.</button>
            <button class="number" style="grid-column:span 4;" onclick="append('0')">0</button>
            
        </div>
    </div>
    <script>
          let display = document.getElementById("display");
        function append(value){
            display.value += value;
        }
        function clearDisplay(){
            display.value="";
        }
        function calculate(){  
            try{
        display.value =eval(display.value);
    }
    
    catch{
        display.value="Error";
    }
}   
//For keyboard support
document.addEventlistner("keydown", function(event){
    let key = event .key;
    if("0123456789+-*/.".includes(key)){
        display.value += key;
    }
    else if(key === "Enter"){
        calculate();
    }
    else if(key === "backspace"){
        dispklay.value = dispaly.value.slice(0,-1);
    }
    else if(key === "Escape"){
        clearDisplay();
    }
}) ; 
    </script>
    
</body>
</html>
